<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mr. Oldverdict — Pipeline Control</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: #0a0703; font-family: Georgia, 'Times New Roman', serif; color: #f5e9c8; min-height: 100vh; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #080604; }
    ::-webkit-scrollbar-thumb { background: #6a4820; border-radius: 3px; }
    @keyframes pulse { 0%,100% { opacity:1; box-shadow: 0 0 8px #d4a017; } 50% { opacity:0.5; box-shadow: 0 0 3px #d4a017; } }
    @keyframes fadein { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    button { transition: all 0.18s ease; }
    button:hover:not(:disabled) { filter: brightness(1.15); transform: translateY(-1px); }
    button:active:not(:disabled) { transform: translateY(0); }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const BEARER  = "mroldverdict_xK9mP1978";
const COUNCIL = "https://revdlo1.rkinfoarch.workers.dev/";
const VOICE   = "https://voice.rkinfoarch.workers.dev/";
const IMAGE   = "https://image.rkinfoarch.workers.dev/";
const RENDER  = "https://revdlo.onrender.com";

const H = { "Authorization": `Bearer ${BEARER}`, "Content-Type": "application/json" };
const CATS = ["A","B","C","D","E","F"];
const CAT_LABELS = { A:"Modern Life", B:"Work & Hustle", C:"Relationships", D:"Time & Meaning", E:"Value Reversal", F:"Current Affairs" };

// ── Log hook ──────────────────────────────────────────────────────────────────
function useLog() {
  const [logs, setLogs] = useState([]);
  const add = (msg, type="info") => {
    const ts = new Date().toLocaleTimeString();
    setLogs(l => [...l, { msg, type, ts, id: Date.now() + Math.random() }]);
  };
  const clear = () => setLogs([]);
  return { logs, add, clear };
}

// ── Components ────────────────────────────────────────────────────────────────
function StatusPill({ status }) {
  const cfg = {
    idle:    { bg:"#1a1208", color:"#9a6828", label:"Idle" },
    running: { bg:"#1a1400", color:"#d4a017", label:"Running…", pulse:true },
    success: { bg:"#0a1a0a", color:"#5cb85c", label:"Done ✓" },
    error:   { bg:"#1a0a0a", color:"#c05050", label:"Error" },
  };
  const c = cfg[status] || cfg.idle;
  return (
    <span style={{ display:"inline-block", padding:"4px 16px", borderRadius:20,
      background:c.bg, color:c.color, fontSize:12, letterSpacing:"0.1em",
      animation: c.pulse ? "pulse 1.6s infinite" : "none",
      border:`1px solid ${c.color}30` }}>
      {c.label}
    </span>
  );
}

function LogConsole({ logs, onClear }) {
  const endRef = useRef(null);
  useEffect(() => { endRef.current?.scrollIntoView({ behavior:"smooth" }); }, [logs]);
  const colors = { step:"#90caf9", success:"#a5d6a7", error:"#ef9a9a", warn:"#ffcc80", info:"#e8d5a0", id:"#ffe082" };
  return (
    <div style={{ maxWidth:680, margin:"0 auto 32px", background:"#0a0806",
      border:"1px solid #2a1c08", borderRadius:12, overflow:"hidden" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
        padding:"10px 16px", borderBottom:"1px solid #2a1c08", background:"#0e0b06" }}>
        <span style={{ fontSize:11, letterSpacing:"0.2em", color:"#6a4820", textTransform:"uppercase" }}>Console Output</span>
        <button onClick={onClear} style={{ background:"none", border:"none", color:"#4a3010",
          fontSize:11, cursor:"pointer", fontFamily:"Georgia,serif", letterSpacing:"0.1em" }}>CLEAR</button>
      </div>
      <div style={{ padding:"12px 16px", maxHeight:220, overflowY:"auto", fontFamily:"monospace", fontSize:12 }}>
        {logs.length === 0
          ? <span style={{ color:"#3a2810" }}>Waiting…</span>
          : logs.map(l => (
            <div key={l.id} style={{ color: colors[l.type] || colors.info, lineHeight:1.7,
              animation:"fadein 0.2s ease" }}>
              <span style={{ color:"#4a3010", marginRight:8 }}>{l.ts}</span>
              <span style={{ marginRight:6 }}>
                {l.type==="step" ? "›" : l.type==="success" ? "✓" : l.type==="error" ? "✗" : l.type==="id" ? "#" : " "}
              </span>
              {l.msg}
            </div>
          ))
        }
        <div ref={endRef} />
      </div>
    </div>
  );
}

function Modal({ show, title, icon, onClose, children }) {
  if (!show) return null;
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", zIndex:100,
      display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background:"#0e0b06", border:"1px solid #4a3418", borderRadius:16,
        padding:32, width:"100%", maxWidth:400, animation:"fadein 0.2s ease",
        boxShadow:"0 8px 48px rgba(0,0,0,0.8)" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:24 }}>
          <div style={{ fontSize:18, fontWeight:700, color:"#d4a017" }}>{icon} {title}</div>
          <button onClick={onClose} style={{ background:"none", border:"none", color:"#6a4820",
            fontSize:20, cursor:"pointer", lineHeight:1 }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function CatPicker({ value, onChange }) {
  return (
    <div>
      <div style={{ fontSize:11, letterSpacing:"0.2em", color:"#a07840", textTransform:"uppercase", marginBottom:10 }}>Category</div>
      <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
        {CATS.map(c => (
          <button key={c} onClick={() => onChange(c)}
            style={{ padding:"7px 14px", borderRadius:8, border:"none",
              fontFamily:"Georgia,serif", fontSize:12, cursor:"pointer",
              background: value===c ? "#8b5e1a" : "#1a1208",
              color: value===c ? "#fff2d8" : "#a07840",
              fontWeight: value===c ? 700 : 400 }}>
            {c}: {CAT_LABELS[c]}
          </button>
        ))}
      </div>
    </div>
  );
}

// ── API helpers ───────────────────────────────────────────────────────────────
async function wakeRender(add) {
  add("Waking Render — cold start can take 30–60s…", "step");
  for (let i = 0; i < 10; i++) {
    try {
      const r = await fetch(`${RENDER}/`, { signal: AbortSignal.timeout(9000) });
      if (r.ok) { add("Render is awake ✓", "success"); return; }
    } catch(e) {}
    add(`Render not ready yet… attempt ${i+2}`, "info");
    await new Promise(res => setTimeout(res, 8000));
  }
  throw new Error("Render did not wake after 80s");
}

async function callCouncil(category, add) {
  add(`Calling council (Category ${category}: ${CAT_LABELS[category]})…`, "step");
  const r = await fetch(COUNCIL, { method:"POST", headers:H, body: JSON.stringify({ category }) });
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  const sid = d.id || d.script_id;
  add(`Script ID: ${sid}`, "id");
  add(`Topic: ${d.raw_topic || d.topic || "—"}`, "info");
  return sid;
}

async function callVoiceAndImage(sid, add) {
  add("Generating voice + image in parallel…", "step");
  const [vr, ir] = await Promise.all([
    fetch(VOICE, { method:"POST", headers:H, body: JSON.stringify({ script_id: sid }) }).then(r => r.json()),
    fetch(IMAGE, { method:"POST", headers:H, body: JSON.stringify({ script_id: sid }) }).then(r => r.json()),
  ]);
  if (vr.error) throw new Error("Voice: " + vr.error);
  if (ir.error) throw new Error("Image: " + ir.error);
  add("Voice generated ✓  Image generated ✓", "success");
}

async function callAssemble(sid, add, onVideoReady) {
  add("Triggering assembly…", "step");
  const r = await fetch(`${RENDER}/assemble`, { method:"POST", headers:H, body: JSON.stringify({ script_id: sid }) });
  if (!r.ok) { const t = await r.text(); throw new Error(`Assembly failed HTTP ${r.status}: ${t.slice(0,200)}`); }
  add("Assembly started ✓ — polling for completion…", "success");
  for (let i = 0; i < 25; i++) {
    await new Promise(res => setTimeout(res, 12000));
    if (i % 3 === 0) add(`Still assembling… (${(i+1)*12}s elapsed)`, "info");
    try {
      const sr = await fetch(`${RENDER}/video-status?script_id=${sid}`, { headers: H });
      if (!sr.ok) { if (i % 3 === 0) add(`Poll returned ${sr.status} — retrying…`, "warn"); continue; }
      const sd = await sr.json();
      if (sd.ready && sd.video_url) {
        add("Video assembled ✓", "success");
        if (onVideoReady) onVideoReady(sid, sd.video_url);
        return sd.video_url;
      }
    } catch(e) { if (i % 3 === 0) add(`Poll error: ${e.message}`, "warn"); }
  }
  add("Timed out after 5 min — check Render logs", "warn");
  return null;
}

async function callPublish(sid, add) {
  await wakeRender(add);
  add("Waiting 5s before publish…", "info");
  await new Promise(res => setTimeout(res, 5000));
  add("Publishing to YouTube…", "step");
  const r = await fetch(`${RENDER}/publish`, { method:"POST", headers:H, body: JSON.stringify({ script_id: sid }) });
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  add("Published to YouTube ✓", "success");
}

async function callPublishInstagram(sid, add) {
  // Render already awake if called after callPublish — no second wake needed
  add("Publishing to Instagram…", "step");
  const r = await fetch(`${RENDER}/publish-instagram`, { method:"POST", headers:H, body: JSON.stringify({ script_id: sid }) });
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  add("Published to Instagram ✓", "success");
}

// Wake + publish both — single entry point for all manual publish flows
async function wakeAndPublishBoth(sid, add) {
  await callPublish(sid, add);        // wakes Render, waits, publishes YT
  await callPublishInstagram(sid, add); // Render already warm
}

// ── Videos Tab ────────────────────────────────────────────────────────────────
function VideosTab({ onReassemble, pipelineAdd }) {
  const [videos, setVideos]       = useState([]);
  const [loading, setLoading]     = useState(false);
  const [actionId, setActionId]   = useState(null);
  const [selected, setSelected]   = useState(new Set());   // script_ids checked
  const [massDeleting, setMassDeleting] = useState(false);

  const load = useCallback(async () => {
    setLoading(true);
    setSelected(new Set());
    try {
      const r = await fetch(`${RENDER}/videos/list`, { headers: H });
      const d = await r.json();
      setVideos(d.videos || []);
    } catch(e) {
      console.error("videos/list error", e);
    } finally { setLoading(false); }
  }, []);

  useEffect(() => { load(); }, []);

  function toggleSelect(sid) {
    setSelected(s => {
      const n = new Set(s);
      n.has(sid) ? n.delete(sid) : n.add(sid);
      return n;
    });
  }

  function toggleAll() {
    if (selected.size === videos.length) {
      setSelected(new Set());
    } else {
      setSelected(new Set(videos.map(v => v.script_id)));
    }
  }

  async function deleteSingle(scriptId) {
    const r = await fetch(`${RENDER}/videos/delete`, { method:"POST", headers:H, body: JSON.stringify({ script_id: scriptId }) });
    const d = await r.json();
    if (!d.deleted) throw new Error(`Delete failed for ${scriptId.slice(0,8)}`);
    return scriptId;
  }

  async function handleDelete(scriptId) {
    if (!confirm("Delete this video? Permanently removed from storage.")) return;
    setActionId(scriptId + "_del");
    try {
      await deleteSingle(scriptId);
      setVideos(v => v.filter(x => x.script_id !== scriptId));
      setSelected(s => { const n = new Set(s); n.delete(scriptId); return n; });
      pipelineAdd(`Deleted ${scriptId.slice(0,8)}… ✓`, "success");
    } catch(e) { pipelineAdd("Delete failed: " + e.message, "error"); }
    finally { setActionId(null); }
  }

  async function handleMassDelete() {
    const ids = [...selected];
    if (!ids.length) return;
    if (!confirm(`Delete ${ids.length} video${ids.length>1?"s":""}? This cannot be undone.`)) return;
    setMassDeleting(true);
    let deleted = 0;
    for (const sid of ids) {
      try {
        await deleteSingle(sid);
        setVideos(v => v.filter(x => x.script_id !== sid));
        setSelected(s => { const n = new Set(s); n.delete(sid); return n; });
        deleted++;
        pipelineAdd(`Deleted ${sid.slice(0,8)}… (${deleted}/${ids.length})`, "info");
      } catch(e) { pipelineAdd(`Failed ${sid.slice(0,8)}: ${e.message}`, "error"); }
    }
    pipelineAdd(`Mass delete complete — ${deleted} of ${ids.length} removed ✓`, "success");
    setMassDeleting(false);
  }

  async function handlePublishBoth(scriptId) {
    setActionId(scriptId + "_pub");
    try {
      await wakeAndPublishBoth(scriptId, pipelineAdd);
      setVideos(v => v.map(x => x.script_id === scriptId
        ? { ...x, scripts: { ...x.scripts, published: true } }
        : x
      ));
      pipelineAdd(`Published ${scriptId.slice(0,8)}… to YouTube + Instagram ✓`, "success");
    } catch(e) { pipelineAdd("Publish failed: " + e.message, "error"); }
    finally { setActionId(null); }
  }

  const allSelected = videos.length > 0 && selected.size === videos.length;
  const someSelected = selected.size > 0;

  const smallBtn = (color, bg, disabled) => ({
    padding:"6px 12px", borderRadius:7, border:"none",
    fontFamily:"Georgia,serif", fontSize:11, fontWeight:700,
    background: disabled ? "#1a1208" : bg,
    color: disabled ? "#3a2810" : color,
    cursor: disabled ? "not-allowed" : "pointer",
    opacity: disabled ? 0.5 : 1,
    whiteSpace:"nowrap"
  });

  const checkStyle = {
    width:16, height:16, accentColor:"#c4861e", cursor:"pointer", flexShrink:0
  };

  return (
    <div style={{ maxWidth:680, margin:"0 auto" }}>

      {/* Header row */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
        <div>
          <div style={{ fontSize:11, letterSpacing:"0.25em", color:"#9a6828", textTransform:"uppercase" }}>Assembled Videos</div>
          <div style={{ fontSize:12, color:"#6a4820", marginTop:3 }}>Review, publish, or delete.</div>
        </div>
        <button onClick={load} disabled={loading}
          style={{ padding:"7px 16px", borderRadius:8, border:"1px solid #4a3418",
            background:"#0e0b06", color:"#a07840", fontFamily:"Georgia,serif",
            fontSize:12, cursor: loading ? "not-allowed" : "pointer" }}>
          {loading ? "Loading…" : "↻ Refresh"}
        </button>
      </div>

      {/* Selection toolbar — only shows when something is selected */}
      {someSelected && (
        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14,
          padding:"10px 14px", borderRadius:9, background:"#1a1208",
          border:"1px solid #4a3010", animation:"fadein 0.2s ease" }}>
          <span style={{ fontSize:12, color:"#c8a870", flex:1 }}>
            {selected.size} selected
          </span>
          <button
            disabled={massDeleting}
            onClick={handleMassDelete}
            style={{ padding:"6px 16px", borderRadius:7, border:"none",
              fontFamily:"Georgia,serif", fontSize:12, fontWeight:700,
              background: massDeleting ? "#2a1010" : "linear-gradient(135deg,#5a1010,#8a1818)",
              color: massDeleting ? "#4a2020" : "#ffd8d8",
              cursor: massDeleting ? "not-allowed" : "pointer" }}>
            {massDeleting ? "Deleting…" : `🗑 Delete ${selected.size}`}
          </button>
          <button
            onClick={() => setSelected(new Set())}
            style={{ padding:"6px 12px", borderRadius:7, border:"1px solid #3a2010",
              background:"none", color:"#6a4020", fontFamily:"Georgia,serif",
              fontSize:11, cursor:"pointer" }}>
            Cancel
          </button>
        </div>
      )}

      {/* Select row */}
      {videos.length > 0 && (
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12,
          padding:"6px 4px", borderBottom:"1px solid #1a1208", flexWrap:"wrap" }}>
          <input type="checkbox" checked={allSelected} onChange={toggleAll} style={checkStyle} />
          <span style={{ fontSize:11, color:"#6a4820", cursor:"pointer", marginRight:6 }} onClick={toggleAll}>
            {allSelected ? "Deselect all" : `All (${videos.length})`}
          </span>
          <button onClick={() => setSelected(new Set(videos.filter(v => !v.scripts?.published).map(v => v.script_id)))}
            style={{ padding:"3px 10px", borderRadius:6, border:"1px solid #3a3010",
              background:"#1a1400", color:"#d4a017", fontFamily:"Georgia,serif",
              fontSize:11, cursor:"pointer" }}>
            Unpublished ({videos.filter(v => !v.scripts?.published).length})
          </button>
          <button onClick={() => setSelected(new Set(videos.filter(v => v.scripts?.published).map(v => v.script_id)))}
            style={{ padding:"3px 10px", borderRadius:6, border:"1px solid #1a3a1a",
              background:"#0a1a0a", color:"#5cb85c", fontFamily:"Georgia,serif",
              fontSize:11, cursor:"pointer" }}>
            Published ({videos.filter(v => v.scripts?.published).length})
          </button>
        </div>
      )}

      {loading && videos.length === 0 && (
        <div style={{ color:"#4a3010", fontSize:13, textAlign:"center", padding:"40px 0" }}>Loading…</div>
      )}

      {!loading && videos.length === 0 && (
        <div style={{ color:"#4a3010", fontSize:13, textAlign:"center", padding:"40px 0",
          border:"1px dashed #2a1c08", borderRadius:12 }}>
          No assembled videos yet.<br/>
          <span style={{ fontSize:11, color:"#3a2810" }}>Run Assemble mode to build videos here.</span>
        </div>
      )}

      {videos.map(v => {
        const sid = v.script_id;
        const setup = v.scripts?.setup || "—";
        const published = v.scripts?.published === true;
        const category = v.scripts?.category || "—";
        const date = v.created_at ? new Date(v.created_at).toLocaleString() : "—";
        const isActing = actionId && actionId.startsWith(sid);
        const isSelected = selected.has(sid);

        return (
          <div key={sid} onClick={() => toggleSelect(sid)}
            style={{ background: isSelected ? "#1a1408" : "#0e0b06",
              border:"1px solid " + (isSelected ? "#6a4010" : published ? "#1a3a1a" : "#2a1c08"),
              borderRadius:12, padding:18, marginBottom:12,
              animation:"fadein 0.25s ease", cursor:"pointer",
              transition:"background 0.15s, border 0.15s" }}>

            {/* Top row — checkbox + status + date */}
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
              <div style={{ display:"flex", gap:10, alignItems:"center" }}>
                <input type="checkbox" checked={isSelected} onChange={() => toggleSelect(sid)}
                  onClick={e => e.stopPropagation()} style={checkStyle} />
                <span style={{ padding:"2px 10px", borderRadius:10, fontSize:10, fontWeight:700,
                  letterSpacing:"0.12em", textTransform:"uppercase",
                  background: published ? "#0a1a0a" : "#1a1400",
                  color: published ? "#5cb85c" : "#d4a017",
                  border: `1px solid ${published ? "#2a4a2a" : "#3a3010"}` }}>
                  {published ? "Published" : "Unpublished"}
                </span>
                <span style={{ padding:"2px 8px", borderRadius:6, fontSize:10,
                  background:"#1a1208", color:"#9a6828" }}>Cat {category}</span>
              </div>
              <span style={{ fontSize:10, color:"#4a3010", fontFamily:"monospace" }}>{date}</span>
            </div>

            {/* Setup text */}
            <div style={{ fontSize:13, color:"#c8a870", marginBottom:8, lineHeight:1.5,
              fontStyle:"italic", borderLeft:"2px solid #4a3010", paddingLeft:10 }}>
              "{setup.length > 90 ? setup.slice(0,90) + "…" : setup}"
            </div>

            {/* Script ID */}
            <div style={{ fontFamily:"monospace", fontSize:10, color:"#4a3010",
              marginBottom:12, wordBreak:"break-all" }}>
              {sid}
            </div>

            {/* Video link */}
            {v.video_url && (
              <a href={v.video_url} target="_blank" rel="noopener noreferrer"
                style={{ display:"block", padding:"7px 12px", borderRadius:7,
                  background:"#0a0703", border:"1px solid #3a2810", color:"#9a6828",
                  textDecoration:"none", fontFamily:"monospace", fontSize:10,
                  wordBreak:"break-all", marginBottom:14, lineHeight:1.5 }}>
                ▶ View video ↗
              </a>
            )}

            {/* Action buttons */}
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
              {!published && (
                <button
                  disabled={!!isActing}
                  onClick={() => handlePublishBoth(sid)}
                  style={smallBtn("#fff2d8", "linear-gradient(135deg,#8b5e1a,#c4861e)", !!isActing)}>
                  {actionId === sid+"_pub" ? "Publishing…" : "▶ Publish Both"}
                </button>
              )}
              <button
                disabled={!!isActing}
                onClick={() => handleReassemble(sid)}
                style={smallBtn("#d8f0ff", "linear-gradient(135deg,#1a4a6a,#1a6a9a)", !!isActing)}>
                🔁 Re-assemble
              </button>
              <button
                disabled={!!isActing}
                onClick={() => handleDelete(sid)}
                style={smallBtn("#ffd8d8", "linear-gradient(135deg,#5a1010,#8a1818)", !!isActing)}>
                {actionId === sid+"_del" ? "Deleting…" : "🗑 Delete"}
              </button>
            </div>
          </div>
        );
      })}
    </div>
  );
}



// ── Render Wake Button ────────────────────────────────────────────────────────
function RenderWakeButton({ onWakeLog }) {
  const SLEEP_MS   = 15 * 60 * 1000;   // 15 min until Render sleeps again
  const COUNTDOWN_S = 2 * 60;           // 2 min countdown after wake

  const [waking, setWaking]         = useState(false);
  const [countdown, setCountdown]   = useState(null);   // seconds remaining in countdown
  const [sleepsIn, setSleepsIn]     = useState(null);   // ms until button re-activates
  const timerRef                    = useRef(null);
  const sleepRef                    = useRef(null);

  function clearTimers() {
    if (timerRef.current)  clearInterval(timerRef.current);
    if (sleepRef.current)  clearTimeout(sleepRef.current);
  }

  function startSleepCountdown() {
    const wakeTime = Date.now();
    // Re-enable button after 15 min
    sleepRef.current = setTimeout(() => setSleepsIn(null), SLEEP_MS);
    // Update sleepsIn every second so we can show "active for Xm Xs"
    timerRef.current = setInterval(() => {
      const remaining = SLEEP_MS - (Date.now() - wakeTime);
      if (remaining <= 0) { clearInterval(timerRef.current); setSleepsIn(null); }
      else setSleepsIn(remaining);
    }, 1000);
  }

  function startCountdown() {
    setCountdown(COUNTDOWN_S);
    const start = Date.now();
    const tick = setInterval(() => {
      const elapsed = Math.floor((Date.now() - start) / 1000);
      const left = COUNTDOWN_S - elapsed;
      if (left <= 0) { clearInterval(tick); setCountdown(null); }
      else setCountdown(left);
    }, 500);
  }

  async function handleWake() {
    setWaking(true);
    clearTimers();
    setSleepsIn(SLEEP_MS);   // immediately mark as just-woken
    try {
      onWakeLog("Waking Render…", "step");
      for (let i = 0; i < 10; i++) {
        try {
          const r = await fetch(`${RENDER}/`, { signal: AbortSignal.timeout(9000) });
          if (r.ok) { onWakeLog("Render is awake ✓", "success"); break; }
        } catch(e) {}
        if (i < 9) { onWakeLog(`Not ready yet… attempt ${i+2}`, "info"); await new Promise(r => setTimeout(r, 8000)); }
      }
      startCountdown();
      startSleepCountdown();
    } catch(e) {
      onWakeLog("Wake failed: " + e.message, "error");
      setSleepsIn(null);
    } finally { setWaking(false); }
  }

  useEffect(() => () => clearTimers(), []);

  const isDisabled = waking || sleepsIn !== null;

  // Format sleepsIn as "14m 32s"
  function fmtMs(ms) {
    const s = Math.ceil(ms / 1000);
    const m = Math.floor(s / 60);
    return m > 0 ? `${m}m ${s % 60}s` : `${s}s`;
  }

  return (
    <div style={{ maxWidth:680, margin:"0 auto 16px",
      background:"#0a0703", border:"1px solid #1a1208",
      borderRadius:10, padding:"12px 16px",
      display:"flex", alignItems:"center", gap:14, flexWrap:"wrap" }}>

      <button
        disabled={isDisabled}
        onClick={handleWake}
        style={{ padding:"8px 20px", borderRadius:8, border:"none",
          fontFamily:"Georgia,serif", fontSize:13, fontWeight:700,
          background: isDisabled
            ? "#1a1208"
            : "linear-gradient(135deg,#1a3a5a,#1a5a8a)",
          color: isDisabled ? "#3a3020" : "#c8e8ff",
          cursor: isDisabled ? "not-allowed" : "pointer",
          whiteSpace:"nowrap",
          boxShadow: isDisabled ? "none" : "0 2px 12px rgba(26,90,138,0.3)" }}>
        {waking ? "Waking…" : "⚡ Wake Render"}
      </button>

      <div style={{ flex:1, minWidth:120 }}>
        {/* Countdown — 2 min after wake */}
        {countdown !== null && (
          <div style={{ fontSize:12, color:"#5cb85c" }}>
            <span style={{ fontWeight:700 }}>Render warming up — {countdown}s</span>
            {" "}
            <span style={{ color:"#3a6a3a", fontSize:11 }}>/ 2:00</span>
          </div>
        )}

        {/* Sleep timer — shows how long until Render sleeps again */}
        {countdown === null && sleepsIn !== null && (
          <div style={{ fontSize:11, color:"#6a8a6a" }}>
            Render active — sleeps in {fmtMs(sleepsIn)}
          </div>
        )}

        {/* Idle state */}
        {countdown === null && sleepsIn === null && (
          <div style={{ fontSize:11, color:"#3a3020" }}>
            Render may be asleep. Wake before assembling.
          </div>
        )}
      </div>

      {/* Active indicator dot */}
      {sleepsIn !== null && countdown === null && (
        <div style={{ width:8, height:8, borderRadius:"50%",
          background:"#5cb85c", flexShrink:0,
          boxShadow:"0 0 6px #5cb85c" }} />
      )}
      {countdown !== null && (
        <div style={{ width:8, height:8, borderRadius:"50%",
          background:"#d4a017", flexShrink:0,
          animation:"pulse 1s infinite",
          boxShadow:"0 0 6px #d4a017" }} />
      )}
    </div>
  );
}

// ── Incomplete Jobs ───────────────────────────────────────────────────────────
function IncompleteJobs({ onAssemble }) {
  const [jobs, setJobs]       = useState([]);
  const [loading, setLoading] = useState(false);
  const [open, setOpen]       = useState(false);
  const [badgeCount, setBadgeCount] = useState(null);

  async function load() {
    setLoading(true);
    try {
      const r = await fetch(`${RENDER}/videos/incomplete`, { headers: H });
      const d = await r.json();
      const list = d.incomplete || [];
      setJobs(list);
      setBadgeCount(list.length);
    } catch(e) {
      console.error("incomplete fetch error", e);
    } finally { setLoading(false); }
  }

  // Load count on mount without opening
  useEffect(() => { load(); }, []);

  if (badgeCount === 0 || badgeCount === null) return null;

  return (
    <div style={{ marginTop:20, borderRadius:10,
      border:"1px solid #4a2010", background:"#0e0906",
      overflow:"hidden" }}>

      {/* Collapsed header — always visible when there are incomplete jobs */}
      <button onClick={() => { setOpen(o => !o); if (!open) load(); }}
        style={{ width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between",
          padding:"12px 16px", background:"none", border:"none",
          cursor:"pointer", fontFamily:"Georgia,serif" }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ fontSize:16 }}>⚠️</span>
          <span style={{ fontSize:13, fontWeight:700, color:"#c87040" }}>
            Incomplete Jobs
          </span>
          <span style={{ padding:"2px 9px", borderRadius:10, fontSize:11, fontWeight:700,
            background:"#3a1a08", color:"#e08040", border:"1px solid #5a2a10" }}>
            {badgeCount}
          </span>
        </div>
        <span style={{ color:"#6a4020", fontSize:14 }}>{open ? "▲" : "▼"}</span>
      </button>

      {open && (
        <div style={{ borderTop:"1px solid #2a1408", padding:"14px 16px" }}>
          <div style={{ fontSize:11, color:"#6a4020", marginBottom:14 }}>
            These scripts have voice and image ready but assembly never finished.
            Click Assemble to retry.
          </div>

          {loading && (
            <div style={{ color:"#4a3010", fontSize:12, textAlign:"center", padding:"16px 0" }}>Loading…</div>
          )}

          {jobs.map(j => {
            const sid = j.script_id;
            const setup = j.scripts?.setup || j.scripts?.raw_topic || "—";
            const cat   = j.scripts?.category || "—";
            const date  = j.created_at ? new Date(j.created_at).toLocaleString() : "—";

            return (
              <div key={sid} style={{ background:"#0a0703", borderRadius:8,
                border:"1px solid #2a1408", padding:"12px 14px", marginBottom:10 }}>

                <div style={{ display:"flex", justifyContent:"space-between",
                  alignItems:"center", marginBottom:8 }}>
                  <span style={{ padding:"2px 8px", borderRadius:6, fontSize:10,
                    background:"#1a1208", color:"#9a6828" }}>Cat {cat}</span>
                  <span style={{ fontSize:10, color:"#3a2010", fontFamily:"monospace" }}>{date}</span>
                </div>

                <div style={{ fontSize:12, color:"#c8a870", marginBottom:8,
                  fontStyle:"italic", borderLeft:"2px solid #3a2010", paddingLeft:8,
                  lineHeight:1.5 }}>
                  "{setup.length > 80 ? setup.slice(0,80)+"…" : setup}"
                </div>

                <div style={{ fontFamily:"monospace", fontSize:10, color:"#3a2010",
                  marginBottom:10, wordBreak:"break-all" }}>{sid}</div>

                <div style={{ display:"flex", gap:8 }}>
                  {/* Voice status */}
                  <span style={{ fontSize:10, padding:"3px 8px", borderRadius:5,
                    background: j.voice_file_url ? "#0a1a0a" : "#1a0a0a",
                    color: j.voice_file_url ? "#5cb85c" : "#c05050",
                    border: `1px solid ${j.voice_file_url ? "#1a3a1a" : "#3a1a1a"}` }}>
                    🎙 {j.voice_file_url ? "Voice ✓" : "No voice"}
                  </span>
                  {/* Image status */}
                  <span style={{ fontSize:10, padding:"3px 8px", borderRadius:5,
                    background: j.image_url ? "#0a1a0a" : "#1a0a0a",
                    color: j.image_url ? "#5cb85c" : "#c05050",
                    border: `1px solid ${j.image_url ? "#1a3a1a" : "#3a1a1a"}` }}>
                    🖼 {j.image_url ? "Image ✓" : "No image"}
                  </span>
                  <div style={{ flex:1 }} />
                  <button onClick={() => onAssemble(sid)}
                    style={{ padding:"5px 14px", borderRadius:7, border:"none",
                      fontFamily:"Georgia,serif", fontSize:11, fontWeight:700,
                      background:"linear-gradient(135deg,#8b5e1a,#c4861e)",
                      color:"#fff2d8", cursor:"pointer", whiteSpace:"nowrap" }}>
                    🔁 Assemble
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const { logs, add, clear } = useLog();
  const [tab, setTab] = useState("pipeline");   // "pipeline" | "videos"
  const [status, setStatus]     = useState("idle");
  const [busy, setBusy]         = useState(false);
  const [publishing, setPublishing] = useState(false);
  const [assembled, setAssembled]   = useState(null);

  const [showAssemble, setShowAssemble] = useState(false);
  const [assembleMode, setAssembleMode] = useState("new");
  const [aCategory, setACategory]       = useState("A");
  const [aScriptId, setAScriptId]       = useState("");

  const [showFull, setShowFull]   = useState(false);
  const [fCategory, setFCategory] = useState("A");

  // Videos tab triggers re-assemble back into pipeline tab
  const [videosKey, setVideosKey] = useState(0);  // bump to refresh videos tab

  function handleReassemble(scriptId) {
    setTab("pipeline");
    setAssembleMode("old");
    setAScriptId(scriptId);
    setShowAssemble(true);
  }

  // ── Assemble flow ────────────────────────────────────────────────────────────
  async function runAssemble() {
    setShowAssemble(false);
    setBusy(true); setStatus("running"); clear();
    try {
      let sid = aScriptId.trim();
      if (assembleMode === "new") {
        sid = await callCouncil(aCategory, add);
        await callVoiceAndImage(sid, add);
      } else {
        if (!sid) throw new Error("Paste a script ID first");
        add(`Using existing script: ${sid}`, "id");
      }
      await wakeRender(add);
      const videoUrl = await callAssemble(sid, add, (s, u) => {
        setAssembled({ sid: s, url: u, published: false });
        setVideosKey(k => k + 1);  // refresh videos tab
      });
      setStatus(videoUrl ? "success" : "error");
      if (videoUrl) add("✓ Video ready — link and publish button below.", "success");
    } catch(e) {
      add(`Error: ${e.message}`, "error");
      setStatus("error");
    } finally { setBusy(false); }
  }

  // ── Full pipeline flow ────────────────────────────────────────────────────────
  async function runFull() {
    setShowFull(false);
    setBusy(true); setStatus("running"); clear();
    try {
      const sid = await callCouncil(fCategory, add);
      await callVoiceAndImage(sid, add);
      await wakeRender(add);
      const videoUrl = await callAssemble(sid, add, (s, u) => {
        setAssembled({ sid: s, url: u, published: false });
      });
      if (videoUrl) {
        add("Waiting 5s before publish…", "info");
        await new Promise(res => setTimeout(res, 5000));
        add("Auto-publishing to YouTube…", "step");
        try { await callPublish(sid, add); } catch(e) { add("YouTube failed: " + e.message, "error"); }
        add("Auto-publishing to Instagram…", "step");
        try { await callPublishInstagram(sid, add); } catch(e) { add("Instagram failed: " + e.message, "error"); }
        setAssembled(a => a ? { ...a, published: true } : a);
        setStatus("success");
        add("Pipeline complete ✓", "success");
        setVideosKey(k => k + 1);
      } else {
        setStatus("error");
      }
    } catch(e) {
      add(`Error: ${e.message}`, "error");
      setStatus("error");
    } finally { setBusy(false); }
  }

  const cardStyle = {
    background:"#0e0b06", border:"1px solid #4a3418",
    borderRadius:16, padding:28, textAlign:"center",
    boxShadow:"0 4px 32px rgba(0,0,0,0.5)",
    flex:"1 1 200px", maxWidth:240
  };
  const primaryBtn = (disabled) => ({
    padding:"11px 24px", borderRadius:10, border:"none",
    fontFamily:"Georgia,serif", fontSize:14, fontWeight:700,
    background: disabled ? "#2a1c08" : "linear-gradient(135deg, #8b5e1a, #c4861e)",
    color: disabled ? "#3a2810" : "#fff2d8", cursor: disabled ? "not-allowed" : "pointer",
    boxShadow: disabled ? "none" : "0 2px 16px rgba(180,110,20,0.35)", width:"100%"
  });
  const dangerBtn = (disabled) => ({
    padding:"11px 24px", borderRadius:10, border:"none",
    fontFamily:"Georgia,serif", fontSize:14, fontWeight:700,
    background: disabled ? "#2a1c08" : "linear-gradient(135deg, #7b1a1a, #b52020)",
    color: disabled ? "#3a2810" : "#ffd8d8", cursor: disabled ? "not-allowed" : "pointer",
    boxShadow: disabled ? "none" : "0 2px 16px rgba(180,30,30,0.3)", width:"100%"
  });
  const toggleBtn = (active) => ({
    flex:1, padding:"9px 0", borderRadius:8, border:"none",
    fontFamily:"Georgia,serif", fontSize:13, cursor:"pointer",
    background: active ? "#8b5e1a" : "#1a1208",
    color: active ? "#fff2d8" : "#a07840", fontWeight: active ? 700 : 400
  });
  const tabBtn = (active) => ({
    padding:"9px 24px", borderRadius:"8px 8px 0 0", border:"none",
    fontFamily:"Georgia,serif", fontSize:13, cursor:"pointer",
    background: active ? "#0e0b06" : "transparent",
    color: active ? "#d4a017" : "#6a4820", fontWeight: active ? 700 : 400,
    borderBottom: active ? "2px solid #d4a017" : "2px solid transparent",
  });

  return (
    <div style={{ minHeight:"100vh", padding:"40px 20px",
      background:"radial-gradient(ellipse at 15% 15%, rgba(100,60,10,0.12) 0%, transparent 55%), radial-gradient(ellipse at 85% 85%, rgba(80,40,5,0.08) 0%, transparent 55%), #0a0703" }}>

      {/* Header */}
      <div style={{ textAlign:"center", marginBottom:36 }}>
        <div style={{ fontSize:10, letterSpacing:"0.35em", color:"#9a6828", textTransform:"uppercase", marginBottom:6 }}>Automated Pipeline</div>
        <div style={{ fontSize:36, fontWeight:700, color:"#d4a017", letterSpacing:"0.04em", textShadow:"0 2px 20px rgba(212,160,23,0.2)" }}>Mr. Oldverdict</div>
        <div style={{ fontSize:13, color:"#a07840", marginTop:5, letterSpacing:"0.08em" }}>Been watching since before.</div>
        <div style={{ marginTop:16 }}><StatusPill status={status} /></div>
      </div>

      {/* Render wake button */}
      <RenderWakeButton onWakeLog={add} />

      {/* Tabs */}
      <div style={{ maxWidth:680, margin:"0 auto 0", display:"flex", gap:4, borderBottom:"2px solid #1a1208", marginBottom:0 }}>
        <button style={tabBtn(tab==="pipeline")} onClick={() => setTab("pipeline")}>⚙ Pipeline</button>
        <button style={tabBtn(tab==="videos")} onClick={() => setTab("videos")}>📼 Videos</button>
      </div>

      <div style={{ maxWidth:680, margin:"0 auto", background:"#0a0703",
        border:"1px solid #1a1208", borderTop:"none", borderRadius:"0 0 12px 12px",
        padding:"28px 20px 20px", marginBottom:24 }}>

        {/* ── Pipeline Tab ── */}
        {tab === "pipeline" && (
          <>
            {/* Action Cards */}
            <div style={{ display:"flex", gap:20, justifyContent:"center", marginBottom:assembled ? 28 : 0, flexWrap:"wrap" }}>
              <div style={cardStyle}>
                <div style={{ fontSize:32, marginBottom:14 }}>🎬</div>
                <div style={{ fontSize:17, fontWeight:700, color:"#d4a017", marginBottom:8 }}>Assemble</div>
                <div style={{ fontSize:12, color:"#a07840", marginBottom:22, lineHeight:1.6 }}>
                  Build video, no publish.<br/>Review in Videos tab.
                </div>
                <button disabled={busy} onClick={() => setShowAssemble(true)} style={primaryBtn(busy)}>
                  {busy ? "Running…" : "Assemble Video"}
                </button>
              </div>
              <div style={cardStyle}>
                <div style={{ fontSize:32, marginBottom:14 }}>🚀</div>
                <div style={{ fontSize:17, fontWeight:700, color:"#d4a017", marginBottom:8 }}>Full Pipeline</div>
                <div style={{ fontSize:12, color:"#a07840", marginBottom:22, lineHeight:1.6 }}>
                  Script → Voice → Image<br/>→ Video → Publish both.
                </div>
                <button disabled={busy} onClick={() => setShowFull(true)} style={dangerBtn(busy)}>
                  {busy ? "Running…" : "Generate & Publish"}
                </button>
              </div>
            </div>

            {/* Last assembled video card */}
            {assembled && (
              <div style={{ marginTop:24, background:"#0e0b06",
                border: assembled.published ? "1px solid #2a4a2a" : "1px solid #8b5e1a",
                borderRadius:12, padding:24, animation:"fadein 0.3s ease",
                boxShadow: assembled.published ? "none" : "0 0 24px rgba(180,110,20,0.15)" }}>

                {/* Header */}
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
                  <div style={{ fontSize:13, fontWeight:700, color:"#d4a017" }}>
                    {assembled.published ? "✓ Published" : "🎬 Video Ready"}
                  </div>
                  <button onClick={() => setAssembled(null)}
                    style={{ background:"none", border:"none", color:"#4a3010",
                      fontSize:18, cursor:"pointer", lineHeight:1, padding:"0 4px" }}>✕</button>
                </div>

                {/* Video link — big and obvious */}
                <a href={assembled.url} target="_blank" rel="noopener noreferrer"
                  style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 16px",
                    borderRadius:9, background:"#141008", border:"1px solid #6a4010",
                    color:"#d4a017", textDecoration:"none", marginBottom:16,
                    fontSize:13, fontWeight:700, letterSpacing:"0.03em" }}>
                  <span style={{ fontSize:18 }}>▶</span>
                  <span>Watch video ↗</span>
                </a>

                {/* Script ID — small, secondary */}
                <div style={{ fontFamily:"monospace", fontSize:10, color:"#3a2810",
                  marginBottom:16, wordBreak:"break-all" }}>
                  {assembled.sid}
                </div>

                {/* Publish button — only if not yet published */}
                {!assembled.published && (
                  <button disabled={publishing} onClick={async () => {
                      setPublishing(true);
                      try {
                        await wakeAndPublishBoth(assembled.sid, add);
                        setAssembled(a => ({...a, published:true}));
                        setVideosKey(k => k+1);
                      } catch(e) { add("Publish failed: "+e.message, "error"); }
                      finally { setPublishing(false); }
                    }}
                    style={{ width:"100%", padding:"12px 0", borderRadius:9, border:"none",
                      fontFamily:"Georgia,serif", fontSize:14, fontWeight:700,
                      cursor: publishing ? "not-allowed" : "pointer",
                      background: publishing ? "#2a1c08" : "linear-gradient(135deg,#8b5e1a,#c4861e)",
                      color: publishing ? "#3a2810" : "#fff2d8",
                      boxShadow: publishing ? "none" : "0 2px 16px rgba(180,110,20,0.3)" }}>
                    {publishing ? "Publishing to YouTube then Instagram…" : "▶ Publish to YouTube + Instagram"}
                  </button>
                )}
              </div>
            )}
            {/* Incomplete jobs — stalled assemblies */}
            <IncompleteJobs onAssemble={handleReassemble} />
          </>
        )}

        {/* ── Videos Tab ── */}
        {tab === "videos" && (
          <VideosTab key={videosKey} onReassemble={handleReassemble} pipelineAdd={add} />
        )}
      </div>

      {/* Console — always visible */}
      <LogConsole logs={logs} onClear={clear} />

      {/* ── Assemble Modal ── */}
      <Modal show={showAssemble} title="Assemble Video" icon="🎬" onClose={() => setShowAssemble(false)}>
        <div style={{ display:"flex", gap:8, marginBottom:20 }}>
          <button style={toggleBtn(assembleMode==="new")} onClick={() => setAssembleMode("new")}>New Script</button>
          <button style={toggleBtn(assembleMode==="old")} onClick={() => setAssembleMode("old")}>Existing ID</button>
        </div>
        {assembleMode === "new" && (
          <div style={{ marginBottom:20 }}><CatPicker value={aCategory} onChange={setACategory} /></div>
        )}
        {assembleMode === "old" && (
          <div style={{ marginBottom:20 }}>
            <div style={{ fontSize:11, letterSpacing:"0.2em", color:"#a07840", textTransform:"uppercase", marginBottom:8 }}>Script ID</div>
            <input value={aScriptId} onChange={e => setAScriptId(e.target.value)}
              placeholder="paste UUID here…"
              style={{ width:"100%", padding:"10px 14px", background:"#0a0703",
                border:"1px solid #6a4820", borderRadius:8, color:"#f5e9c8",
                fontFamily:"monospace", fontSize:13, outline:"none" }} />
            <div style={{ fontSize:11, color:"#9a6828", marginTop:6 }}>Voice + image must already exist for this ID.</div>
          </div>
        )}
        <button onClick={runAssemble} style={primaryBtn(false)}>
          {assembleMode === "new" ? "Generate + Assemble" : "Assemble This ID"}
        </button>
      </Modal>

      {/* ── Full Pipeline Modal ── */}
      <Modal show={showFull} title="Generate & Publish" icon="🚀" onClose={() => setShowFull(false)}>
        <div style={{ marginBottom:20 }}><CatPicker value={fCategory} onChange={setFCategory} /></div>
        <div style={{ fontSize:12, color:"#a07840", marginBottom:20, lineHeight:1.7,
          padding:"12px 14px", background:"#0a0703", borderRadius:8, border:"1px solid #3a2810" }}>
          Council → Voice + Image → Assembly → YouTube + Instagram.<br/>
          Takes 3–5 minutes. Keep this tab open.
        </div>
        <button onClick={runFull} style={dangerBtn(false)}>Run Full Pipeline</button>
      </Modal>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
